<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<title data-i18n="settingsTitle">settings</title>
		<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css"
			integrity="sha384-HSMxcRTRxnN+Bdg0JdbxYKrThecOKuH5zCYotlSAcp1+c8xmyTe9GYg1l9a69psu" crossorigin="anonymous">
	</head>

	<body>
		
		<div class="jumbotron">
			<div class="container">
				<h1 data-i18n="settingsTitle">Github Remark</h1>
				<p data-i18n="settingsSubtitle">给你的github好友添加备注吧～</p>
			</div>
		</div>

		<div class="container clearfix">
		
			<div class="bs-example">
				<div class="form-horizontal">
                    <div style="float: right; margin-bottom: 20px;">
                        <button id="toggleLang" class="btn btn-default" data-i18n="language">语言 / Language</button>
                    </div>
                    <div style="clear: both;"></div>

					<div class="form-group">
						<label for="webdavUrl" class="col-sm-2 control-label" data-i18n="webdavUrlLabel">WebDAV 地址</label>
						<div class="col-sm-10">
							<input id="webdavUrl" type="text" class="form-control" data-i18n="webdavUrlPlaceholder" placeholder="例如: https://dav.jianguoyun.com/dav/github_remarks.json">
						</div>
					</div>
					<div class="form-group">
						<label for="webdavUser" class="col-sm-2 control-label" data-i18n="webdavUserLabel">WebDAV 账号</label>
						<div class="col-sm-10">
							<input id="webdavUser" type="text" class="form-control" data-i18n="webdavUserPlaceholder" placeholder="你的账号">
						</div>
					</div>
					<div class="form-group">
						<label for="webdavPass" class="col-sm-2 control-label" data-i18n="webdavPassLabel">WebDAV 密码</label>
						<div class="col-sm-10">
							<input id="webdavPass" type="password" class="form-control" data-i18n="webdavPassPlaceholder" placeholder="应用授权密码">
						</div>
					</div>
					<div class="form-group">
						<div class="col-sm-offset-2 col-sm-10">
							<button id="save" class="btn btn-primary" type="button" data-i18n="saveConfig">保存配置</button>
							<button id="testConn" class="btn btn-info" type="button" style="margin-left: 10px;" data-i18n="testConnection">测试连接</button>
							<span id="saveStatus" style="margin-left: 10px; color: green; display: none;" data-i18n="saveSuccess">保存成功！</span>
							<span id="testStatus" style="margin-left: 10px; display: none;"></span>
						</div>
					</div>
					<hr>
					<div class="form-group">
						<label class="col-sm-2 control-label" data-i18n="localConfigData">本地配置管理</label>
						<div class="col-sm-10">
							<button id="exportBtn" class="btn btn-default" type="button" data-i18n="exportJson">导出配置 (JSON)</button>
							<button id="importBtn" class="btn btn-default" type="button" style="margin-left: 10px;" data-i18n="importJson">导入配置 (JSON)</button>
							<input type="file" id="importFile" accept=".json" style="display: none;">
						</div>
					</div>
				</div>
			</div>	 
			
		</div>

        <script src="i18n.js"></script>
		<script src="option.js"></script>
	</body>

</html>
