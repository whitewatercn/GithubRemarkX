<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<title>settings</title>
		<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css"
			integrity="sha384-HSMxcRTRxnN+Bdg0JdbxYKrThecOKuH5zCYotlSAcp1+c8xmyTe9GYg1l9a69psu" crossorigin="anonymous">
	</head>

	<body>
		
		<div class="jumbotron">
			<div class="container">
				<h1>Github Remark</h1>
				<p>给你的github好友添加备注吧～</p>
			</div>
		</div>

		<div class="container clearfix">
		
			<div class="bs-example">
				<div class="form-horizontal">
					<div class="form-group">
						<label for="webdavUrl" class="col-sm-2 control-label">WebDAV 地址</label>
						<div class="col-sm-10">
							<input id="webdavUrl" type="text" class="form-control" placeholder="例如: https://dav.jianguoyun.com/dav/github_remarks.json">
						</div>
					</div>
					<div class="form-group">
						<label for="webdavUser" class="col-sm-2 control-label">WebDAV 账号</label>
						<div class="col-sm-10">
							<input id="webdavUser" type="text" class="form-control" placeholder="你的账号">
						</div>
					</div>
					<div class="form-group">
						<label for="webdavPass" class="col-sm-2 control-label">WebDAV 密码</label>
						<div class="col-sm-10">
							<input id="webdavPass" type="password" class="form-control" placeholder="应用授权密码">
						</div>
					</div>
					<div class="form-group">
						<div class="col-sm-offset-2 col-sm-10">
							<button id="save" class="btn btn-primary" type="button">保存配置</button>
							<button id="testConn" class="btn btn-info" type="button" style="margin-left: 10px;">测试连接</button>
							<span id="saveStatus" style="margin-left: 10px; color: green; display: none;">保存成功！</span>
							<span id="testStatus" style="margin-left: 10px; display: none;"></span>
						</div>
					</div>
					<hr>
					<div class="form-group">
						<label class="col-sm-2 control-label">本地配置管理</label>
						<div class="col-sm-10">
							<button id="exportBtn" class="btn btn-default" type="button">导出配置 (JSON)</button>
							<button id="importBtn" class="btn btn-default" type="button" style="margin-left: 10px;">导入配置 (JSON)</button>
							<input type="file" id="importFile" accept=".json" style="display: none;">
						</div>
					</div>
				</div>
			</div>	 
			
		</div>

		<script src="option.js"></script>
	</body>

</html>
